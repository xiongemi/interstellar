name: PR Checks

on:
  pull_request:

env:
  NODE_OPTIONS: '--max_old_space_size=4096'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  pr:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore node_modules cache files
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-
      - run: yarn install --frozen-lockfile
      - run: yarn nx show projects
      - name: Run lint
        run: yarn eslint .
      - name: Run test
        run: yarn jest
      - name: Run build
        run: yarn build:all
      - name: Run typecheck
        run: yarn tsc --build

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      # Always install OS packages: browser cache restore skips install, and WebKit needs
      # libs like libwoff2dec that --with-deps would otherwise apt-install.
      - name: Install Playwright system dependencies
        run: npx playwright install-deps
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install
      - name: Run e2e
        run: yarn run e2e:all
