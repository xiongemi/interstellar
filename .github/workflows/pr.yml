name: PR Checks

on:
  pull_request:

env:
  NODE_OPTIONS: '--max_old_space_size=4096'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  pr:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore node_modules cache files
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-
      - run: yarn install --frozen-lockfile
      - run: yarn nx show projects
      - name: Derive appropriate SHAs for base and head
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Compute PR cache segment
        id: pr_segment
        run: |
          hash=$(git diff --name-only "${NX_BASE}" "${NX_HEAD}" | sort -u | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Count affected projects with lint target
        id: count-lint
        uses: ./.github/actions/count-affected-projects
        with:
          target: lint
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore eslint cache files
        if: steps.count-lint.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: ~/.eslint
          key: eslint-pr-${{ github.event.pull_request.number }}-${{ steps.pr_segment.outputs.hash }}
          restore-keys: |
            eslint-pr-${{ github.event.pull_request.number }}-
            eslint-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}-
            eslint-main-${{ runner.os }}-
      - name: Run lint
        if: steps.count-lint.outputs.count > 0
        run: 'yarn eslint . --cache --cache-strategy content --cache-location ~/.eslint/'
        
      - name: Count affected projects with test target
        id: count-test
        uses: ./.github/actions/count-affected-projects
        with:
          target: test
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Jest cache files
        if: steps.count-test.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: .jest/cache
          key: jest-pr-${{ github.event.pull_request.number }}-${{ steps.pr_segment.outputs.hash }}
          restore-keys: |
            jest-pr-${{ github.event.pull_request.number }}-
            jest-main-${{ runner.os }}-${{ hashFiles('yarn.lock', 'nx.json', 'jest.preset.js', '**/jest.config.*') }}-
            jest-main-${{ runner.os }}-
      - name: Run test
        if: steps.count-test.outputs.count > 0
        run: |
          mkdir -p .jest/cache
          yarn jest --changedSince=${{ env.NX_BASE }}

      - name: Count affected projects with build target
        id: count-build
        uses: ./.github/actions/count-affected-projects
        with:
          target: build
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Next.js Build Cache
        if: steps.count-build.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/next
            .next/crew/cache
            .next/flight-simulator/cache
            .next/navigation/cache
            .next/ticket-booking/cache
            .next/warp-drive-manager/cache
          key: nextjs-pr-${{ github.event.pull_request.number }}-${{ steps.pr_segment.outputs.hash }}
          restore-keys: |
            nextjs-pr-${{ github.event.pull_request.number }}-
            nextjs-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '**/next.config.*', 'nx.json') }}-
            nextjs-main-${{ runner.os }}-
      - name: Run build
        if: steps.count-build.outputs.count > 0
        run: 'yarn build:all'
      - name: Debug Next.js cache sizes
        if: steps.count-build.outputs.count > 0
        run: |
          for p in node_modules/.cache/next .next/crew/cache .next/flight-simulator/cache .next/navigation/cache .next/ticket-booking/cache .next/warp-drive-manager/cache; do
            if [ -d "$p" ]; then du -sh "$p"; else echo "$p (missing)"; fi
          done

      - name: Count affected projects with e2e target
        id: count-e2e
        uses: ./.github/actions/count-affected-projects
        with:
          target: e2e
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Cache Playwright Browsers
        if: steps.count-e2e.outputs.count > 0
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      # Always install OS packages: browser cache restore skips install, and WebKit needs
      # libs like libwoff2dec that --with-deps would otherwise apt-install.
      - name: Install Playwright system dependencies
        if: steps.count-e2e.outputs.count > 0
        run: npx playwright install-deps
      - name: Install Playwright Browsers
        if: steps.count-e2e.outputs.count > 0 && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install
      - name: Run e2e
        if: steps.count-e2e.outputs.count > 0
        run: yarn run e2e:all:affected
        continue-on-error: true

      - name: Count affected projects with typecheck target
        id: count-typecheck
        uses: ./.github/actions/count-affected-projects
        with:
          target: typecheck
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Run typecheck
        if: steps.count-typecheck.outputs.count > 0
        run: 'yarn tsgo --build --verbose'
