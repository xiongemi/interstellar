name: PR Checks

on:
  pull_request:

env:
  NODE_OPTIONS: '--max_old_space_size=4096'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  pr:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore node_modules cache files
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-
      - run: yarn install --frozen-lockfile
      - run: yarn nx show projects
      - name: Derive appropriate SHAs for base and head
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Restore eslint cache files
        uses: actions/cache@v5
        with:
          path: ~/.eslint
          key: eslint-${{ runner.os }}-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            eslint-${{ runner.os }}-pr-${{ github.event.pull_request.number }}-
            eslint-${{ runner.os }}-
      - name: Run lint
        run: 'yarn eslint . --cache --cache-strategy content --cache-location ~/.eslint/'

      - name: Monitor memory usage
        run: free -m
      - run: yarn jest --showConfig
        
      - name: Count affected projects with test target
        id: count-test
        uses: ./.github/actions/count-affected-projects
        with:
          target: test
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Jest cache files
        if: steps.count-test.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: .jest/cache
          key: jest-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            jest-pr-${{ github.event.pull_request.number }}-
            jest-full-
      - name: Run test
        if: steps.count-test.outputs.count > 0
        run: |
          mkdir -p .jest/cache
          yarn jest --changedSince=${{ env.NX_BASE }}

      - name: Count affected projects with build target
        id: count-build
        uses: ./.github/actions/count-affected-projects
        with:
          target: build
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Next.js Build Cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/next
            .next/*/cache
          key: nextjs-cache-${{ runner.os }}-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            nextjs-cache-${{ runner.os }}-pr-${{ github.event.pull_request.number }}-
            nextjs-cache-${{ runner.os }}-nextjs-
      - name: Run build
        run: 'yarn build:all'

      - name: Count affected projects with e2e target
        id: count-e2e
        uses: ./.github/actions/count-affected-projects
        with:
          target: e2e
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Cache Playwright Browsers
        if: steps.count-e2e.outputs.count > 0
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      # Always install OS packages: browser cache restore skips install, and WebKit needs
      # libs like libwoff2dec that --with-deps would otherwise apt-install.
      - name: Install Playwright system dependencies
        run: npx playwright install-deps
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install
      - name: Run e2e
        run: yarn run e2e:all:affected
        continue-on-error: true

      - name: Count affected projects with typecheck target
        id: count-typecheck
        uses: ./.github/actions/count-affected-projects
        with:
          target: typecheck
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore TypeScript build info
        if: steps.count-typecheck.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: '**/*.tsbuildinfo'
          key: tsbuildinfo-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            tsbuildinfo-pr-${{ github.event.pull_request.number }}
            tsbuildinfo-full-
      - name: Restore dist/out-tsc cache
        if: steps.count-typecheck.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: dist/out-tsc
          key: out-tsc-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            out-tsc-pr-${{ github.event.pull_request.number }}
            out-tsc-full-
      - name: Run typecheck
        if: steps.count-typecheck.outputs.count > 0
        run: 'yarn tsgo --build --verbose'
