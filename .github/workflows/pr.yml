name: PR Checks

on:
  pull_request:

env:
  NODE_OPTIONS: '--max_old_space_size=3072'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  pr:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Restore node_modules cache files
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-
      - run: yarn install --frozen-lockfile
      - run: yarn nx show projects

      - name: Restore eslint cache files
        uses: actions/cache@v5
        with:
          path: ~/.eslint
          # 1. Only hash configs and lockfiles to save CI boot time.
          # 2. Add github.sha so it saves a fresh, updated cache at the end of every run.
          key: eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}-
            eslint-${{ runner.os }}-
      - name: Run lint
        run: 'yarn eslint . --cache --cache-strategy content --cache-location ~/.eslint/ --concurrency=2'

      - name: Count affected projects with test target
        id: count-test
        uses: ./.github/actions/count-affected-projects
        with:
          target: test
      - name: Restore Jest cache files
        if: steps.count-test.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: .jest/cache
          key: jest-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          restore-keys: |
            jest-pr-${{ github.event.pull_request.number }}-
            jest-full-
      - name: Run test
        if: steps.count-test.outputs.count > 0
        run: |
          mkdir -p .jest/cache
          yarn jest --cache --cacheDirectory=.jest/cache --maxWorkers=2

      - name: Count affected projects with build target
        id: count-build
        uses: ./.github/actions/count-affected-projects
        with:
          target: build
      - name: Restore Next.js Build Cache
        if: steps.count-build.outputs.count > 0
        uses: actions/cache@v5
        with:
          # See here for caching with `yarn`, `bun` or other package managers https://github.com/actions/cache/blob/main/examples.md or you can leverage caching with actions/setup-node https://github.com/actions/setup-node
          path: |
            node_modules/.cache/next
            .next
          # Generate a new cache whenever packages or source files change.
          key: nextjs-cache-${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock', 'apps/**/next.config.js', 'libs/**/next.config.js', 'apps/**/tsconfig.json', 'libs/**/tsconfig.json', 'nx.json') }}-${{ github.sha }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            nextjs-cache-${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock', 'apps/**/next.config.js', 'libs/**/next.config.js', 'apps/**/tsconfig.json', 'libs/**/tsconfig.json', 'nx.json') }}-
            nextjs-cache-${{ runner.os }}-nextjs-
      - name: Run build
        run: 'yarn build:all'

      - name: Count affected projects with e2e target
        id: count-e2e
        uses: ./.github/actions/count-affected-projects
        with:
          target: e2e
      - name: Cache Playwright Browsers
        if: steps.count-e2e.outputs.count > 0
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      # Always install OS packages: browser cache restore skips install, and WebKit needs
      # libs like libwoff2dec that --with-deps would otherwise apt-install.
      - name: Install Playwright system dependencies
        if: steps.count-e2e.outputs.count > 0
        run: npx playwright install-deps
      - name: Install Playwright Browsers
        if: steps.count-e2e.outputs.count > 0 && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install
      - name: Run e2e
        if: steps.count-e2e.outputs.count > 0
        run: yarn run e2e:all
        continue-on-error: true

      - name: Count affected projects with typecheck target
        id: count-typecheck
        uses: ./.github/actions/count-affected-projects
        with:
          target: typecheck
      - name: Restore TypeScript build info
        if: steps.count-typecheck.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: '**/*.tsbuildinfo'
          key: tsbuildinfo-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            tsbuildinfo-pr-${{ github.event.pull_request.number }}
            tsbuildinfo-full-
      - name: Restore dist/out-tsc cache
        if: steps.count-typecheck.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: dist/out-tsc
          key: out-tsc-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            out-tsc-pr-${{ github.event.pull_request.number }}
            out-tsc-full-
      - name: Run typecheck
        if: steps.count-typecheck.outputs.count > 0
        run: 'yarn tsgo --build --verbose'
