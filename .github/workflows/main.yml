name: Main Checks

on:
  push:
    branches:
      - main

env:
  NODE_OPTIONS: '--max_old_space_size=3072'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NX_BASE: ${{ github.event.before }}
      NX_HEAD: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        name: Checkout [main]
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-
      - run: yarn install --frozen-lockfile
      - run: yarn nx show projects

      - name: Count affected projects with lint target
        id: count-lint
        uses: ./.github/actions/count-affected-projects
        with:
          target: lint
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore eslint cache files
        if: steps.count-lint.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: ~/.eslint
          # 1. Only hash configs and lockfiles to save CI boot time.
          # 2. Add github.sha so it saves a fresh, updated cache at the end of every run.
          key: eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}-
            eslint-${{ runner.os }}-
      - name: Run lint
        if: steps.count-lint.outputs.count > 0
        run: 'yarn eslint . --cache --cache-strategy content --cache-location ~/.eslint/'

      - name: Count affected projects with test target
        id: count-test
        uses: ./.github/actions/count-affected-projects
        with:
          target: test
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Jest cache files
        if: steps.count-test.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: '.jest/cache'
          key: jest-full-${{ hashFiles('**/jest.config.js', 'nx.json') }}
          restore-keys: |
            jest-full-
      - name: Run test
        if: steps.count-test.outputs.count > 0
        run: |
          mkdir -p .jest/cache
          yarn jest --cache --cacheDirectory=.jest/cache

      - name: Count affected projects with build target
        id: count-build
        uses: ./.github/actions/count-affected-projects
        with:
          target: build
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Next.js Build Cache
        if: steps.count-build.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/next
            .next
          key: nextjs-cache-${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock', 'apps/**/next.config.js', 'libs/**/next.config.js', 'apps/**/tsconfig.json', 'libs/**/tsconfig.json', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nextjs-cache-${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock', 'apps/**/next.config.js', 'libs/**/next.config.js', 'apps/**/tsconfig.json', 'libs/**/tsconfig.json', 'nx.json') }}-
            nextjs-cache-${{ runner.os }}-nextjs-
      - name: Run build
        if: steps.count-build.outputs.count > 0
        run: 'yarn build:all'

      - name: Count affected projects with e2e target
        id: count-e2e
        uses: ./.github/actions/count-affected-projects
        with:
          target: e2e
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Cache Playwright Browsers
        if: steps.count-e2e.outputs.count > 0
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright system dependencies
        if: steps.count-e2e.outputs.count > 0
        run: npx playwright install-deps
      - name: Install Playwright Browsers
        if: steps.count-e2e.outputs.count > 0 && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install
      - name: Run e2e
        if: steps.count-e2e.outputs.count > 0
        run: yarn run e2e:all
        continue-on-error: true

      - name: Count affected projects with typecheck target
        id: count-typecheck
        uses: ./.github/actions/count-affected-projects
        with:
          target: typecheck
      - name: Restore TypeScript build info
        if: steps.count-typecheck.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: '**/*.tsbuildinfo'
          key: tsbuildinfo-full-${{ hashFiles('tsconfig*.json', 'nx.json') }}
          restore-keys: |
            tsbuildinfo-full-
      - name: Restore dist/out-tsc cache
        if: steps.count-typecheck.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: dist/out-tsc
          key: out-tsc-full-${{ hashFiles('tsconfig*.json', 'nx.json') }}
          restore-keys: |
            out-tsc-full-
      - name: Run typecheck
        if: steps.count-typecheck.outputs.count > 0
        run: 'yarn tsgo --build --verbose'
