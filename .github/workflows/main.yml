name: Main Checks

on:
  push:
    branches:
      - main

env:
  NODE_OPTIONS: '--max_old_space_size=4096'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        name: Checkout [main]
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-
      - run: yarn install --frozen-lockfile
      - run: yarn nx show projects

      - name: Derive appropriate SHAs for base and head
        uses: nrwl/nx-set-shas@v4

      # Baseline cache keys (eslint-main-/jest-main-/nextjs-main-) must match nightly.yml and pr.yml restore-keys.
      - name: Count affected projects with lint target
        id: count-lint
        uses: ./.github/actions/count-affected-projects
        with:
          target: lint
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore eslint cache files
        if: steps.count-lint.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: ~/.eslint
          key: eslint-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}
          restore-keys: |
            eslint-main-${{ runner.os }}-
      - name: Run lint
        if: steps.count-lint.outputs.count > 0
        run: 'yarn eslint . --cache --cache-strategy content --cache-location ~/.eslint/'
      - name: Save eslint cache
        if: success() && steps.count-lint.outputs.count > 0
        uses: actions/cache/save@v5
        with:
          path: ~/.eslint
          key: eslint-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}

      - name: Count affected projects with test target
        id: count-test
        uses: ./.github/actions/count-affected-projects
        with:
          target: test
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Jest cache files
        if: steps.count-test.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: '.jest/cache'
          key: jest-main-${{ runner.os }}-${{ hashFiles('yarn.lock', 'nx.json', 'jest.preset.js', '**/jest.config.*') }}
          restore-keys: |
            jest-main-${{ runner.os }}-
      - name: Run test
        if: steps.count-test.outputs.count > 0
        run: |
          mkdir -p .jest/cache
          yarn jest --cache
      - name: Save Jest cache
        if: success() && steps.count-test.outputs.count > 0
        uses: actions/cache/save@v5
        with:
          path: '.jest/cache'
          key: jest-main-${{ runner.os }}-${{ hashFiles('yarn.lock', 'nx.json', 'jest.preset.js', '**/jest.config.*') }}

      - name: Count affected projects with build target
        id: count-build
        uses: ./.github/actions/count-affected-projects
        with:
          target: build
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Restore Next.js Build Cache
        if: steps.count-build.outputs.count > 0
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/next
            .next/crew/cache
            .next/flight-simulator/cache
            .next/navigation/cache
            .next/ticket-booking/cache
            .next/warp-drive-manager/cache
          key: nextjs-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '**/next.config.*', 'nx.json') }}
          restore-keys: |
            nextjs-main-${{ runner.os }}-
      - name: Run build
        if: steps.count-build.outputs.count > 0
        run: |
          yarn next build apps/crew
          yarn next build apps/flight-simulator
          yarn next build apps/navigation
          yarn next build apps/ticket-booking
          yarn next build apps/warp-drive-manager
      - name: Debug Next.js cache sizes
        if: steps.count-build.outputs.count > 0
        run: |
          for p in node_modules/.cache/next .next/crew/cache .next/flight-simulator/cache .next/navigation/cache .next/ticket-booking/cache .next/warp-drive-manager/cache; do
            if [ -d "$p" ]; then du -sh "$p"; else echo "$p (missing)"; fi
          done
      - name: Save Next.js Build Cache
        if: success() && steps.count-build.outputs.count > 0
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules/.cache/next
            .next/crew/cache
            .next/flight-simulator/cache
            .next/navigation/cache
            .next/ticket-booking/cache
            .next/warp-drive-manager/cache
          key: nextjs-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '**/next.config.*', 'nx.json') }}

      - name: Count affected projects with e2e target
        id: count-e2e
        uses: ./.github/actions/count-affected-projects
        with:
          target: e2e
          base: ${{ env.NX_BASE }}
          head: ${{ env.NX_HEAD }}
      - name: Cache Playwright Browsers
        if: steps.count-e2e.outputs.count > 0
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright system dependencies
        if: steps.count-e2e.outputs.count > 0
        run: npx playwright install-deps
      - name: Install Playwright Browsers
        if: steps.count-e2e.outputs.count > 0 && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install
      - name: Run e2e
        if: steps.count-e2e.outputs.count > 0
        run: yarn run e2e:all
        continue-on-error: true

      - name: Count affected projects with typecheck target
        id: count-typecheck
        uses: ./.github/actions/count-affected-projects
        with:
          target: typecheck
      - name: Run typecheck
        if: steps.count-typecheck.outputs.count > 0
        run: 'yarn tsgo --build --verbose'
