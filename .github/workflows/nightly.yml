name: Nightly Cache

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_OPTIONS: '--max_old_space_size=4096'

jobs:
  nightly-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable Corepack (Yarn 4)
        run: corepack enable
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: node-modules-
      - run: yarn install --frozen-lockfile

      # Baseline keys must match main.yml and pr.yml restore-keys.
      - name: Restore eslint cache
        uses: actions/cache@v5
        with:
          path: ~/.eslint
          key: eslint-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}
          restore-keys: |
            eslint-main-${{ runner.os }}-
      - name: Run lint for all projects
        run: 'yarn nx run-many -t lint --all --parallel=3 --configuration=ci'
      - name: Save eslint cache
        uses: actions/cache/save@v5
        with:
          path: ~/.eslint
          key: eslint-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '.eslintrc*', 'eslint.config.*', 'nx.json') }}

      - name: Restore Jest cache
        uses: actions/cache@v5
        with:
          path: '.jest/cache'
          key: jest-main-${{ runner.os }}-${{ hashFiles('yarn.lock', 'nx.json', 'jest.preset.js', '**/jest.config.*') }}
          restore-keys: |
            jest-main-${{ runner.os }}-
      - name: Run test for all projects
        run: 'yarn nx run-many -t test --all --parallel=3'
      - name: Save jest cache
        uses: actions/cache/save@v5
        with:
          path: '.jest/cache'
          key: jest-main-${{ runner.os }}-${{ hashFiles('yarn.lock', 'nx.json', 'jest.preset.js', '**/jest.config.*') }}

      - name: Restore Next.js Build Cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/next
            .next/crew/cache
            .next/flight-simulator/cache
            .next/navigation/cache
            .next/ticket-booking/cache
            .next/warp-drive-manager/cache
          key: nextjs-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '**/next.config.*', 'nx.json') }}
          restore-keys: |
            nextjs-main-${{ runner.os }}-
      - name: Run build for all projects
        run: |
          yarn next build apps/crew
          yarn next build apps/flight-simulator
          yarn next build apps/navigation
          yarn next build apps/ticket-booking
          yarn next build apps/warp-drive-manager
      - name: Debug Next.js cache sizes
        run: |
          for p in node_modules/.cache/next .next/crew/cache .next/flight-simulator/cache .next/navigation/cache .next/ticket-booking/cache .next/warp-drive-manager/cache; do
            if [ -d "$p" ]; then du -sh "$p"; else echo "$p (missing)"; fi
          done
      - name: Save Next.js Build Cache
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules/.cache/next
            .next/crew/cache
            .next/flight-simulator/cache
            .next/navigation/cache
            .next/ticket-booking/cache
            .next/warp-drive-manager/cache
          key: nextjs-main-${{ runner.os }}-${{ hashFiles('yarn.lock', '**/next.config.*', 'nx.json') }}

      - name: Run typecheck for all projects
        run: 'yarn nx run-many -t typecheck --projects="shared-*,crew-important-*" --parallel=3'
      - name: Save TypeScript build info
        uses: actions/cache/save@v5
        with:
          path: '**/*.tsbuildinfo'
          key: tsbuildinfo-full-${{ hashFiles('tsconfig*.json', 'nx.json') }}
      - name: Save dist/out-tsc cache
        uses: actions/cache/save@v5
        with:
          path: dist/out-tsc
          key: out-tsc-full-${{ hashFiles('tsconfig*.json', 'nx.json') }}
